<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Compare</title>
<link rel="stylesheet" href="style.css">
<!-- Three.js & GLTFLoader -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<div id="topBar">
    <div id="proTip" style="position: absolute; left: 20px; top: 30px; color: #FFFFFF; font-size: 14px; opacity: 0.6; pointer-events: none;">
        Pro tip: You can drag and scale the car models!
    </div>
    <div id="searchContainer">
        <input type="text" id="searchInput" placeholder="Search cars...">
        <ul id="searchResults" class="hidden"></ul>
    </div>
    <div id="unitToggleContainer">
        <span class="toggleLabel">Show Best</span>
        <label class="switch">
            <input type="checkbox" id="bestToggle">
            <span class="slider round"></span>
        </label>
        <span class="toggleLabel" style="margin-left: 30px;">Kilometers</span>
        <label class="switch">
            <input type="checkbox" id="unitToggle">
            <span class="slider round"></span>
        </label>
    </div>
</div>
<div id="appContainer">
    <div id="comparisonContainer"></div>
</div>
<script src="scripts.js"></script>
</body>
</html>
